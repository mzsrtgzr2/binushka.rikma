# Testimonials Section
testimonial__title: מה אומרים על הסדנאות
testimonial__description: נשים שהשתתפו בסדנאות הרקמה משתפות איך זה הרגיש באמת.

testimonial__items:
  - name: "דנה"
    image: "https://i.pravatar.cc/300?img=5"
    designation: "סדנת מתחילות"
    content : "הגעתי בלי שום ניסיון ויצאתי עם יצירה שסוף סוף תליתי בבית. ההסבר היה רגוע, ברור וממש בגובה העיניים."

  - name: "הילה"
    image: "https://i.pravatar.cc/300?img=12"
    designation: "סדנת ערב"
    content : "הייתי צריכה זמן לעצמי וזה היה בול. שעתיים של שקט, יצירה ואווירה נעימה, עם המון סבלנות לכל שאלה."

  - name: "שיר"
    image: "https://i.pravatar.cc/300?img=32"
    designation: "מפגש חברות"
    content : "באנו כמה חברות לערב משותף והיה פשוט מושלם. כל אחת עבדה בקצב שלה וקיבלה ליווי אישי."

  - name: "נעמה"
    image: "https://i.pravatar.cc/300?img=47"
    designation: "סדנה פרטית"
    content : "הסדנה הפרטית הייתה מושקעת מהפרטים הקטנים ועד לתוצאה. יצאתי עם ביטחון להמשיך לרקום גם בבית."


